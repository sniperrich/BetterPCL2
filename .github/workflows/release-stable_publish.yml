name: Publish (Release)

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    strategy:
      matrix:
        include:
          - configuration: Release
            architecture: x64
            self_contained: true
            artifact_suffix: ''
            runtime_variant: SelfContained
          - configuration: Release
            architecture: x64
            self_contained: false
            artifact_suffix: _NoRuntime
            runtime_variant: NoRuntime
          - configuration: Release
            architecture: ARM64
            self_contained: true
            artifact_suffix: ''
            runtime_variant: SelfContained
          - configuration: Release
            architecture: ARM64
            self_contained: false
            artifact_suffix: _NoRuntime
            runtime_variant: NoRuntime
      fail-fast: false

    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: ${{ matrix.configuration }}
      architecture: ${{ matrix.architecture }}
      self_contained: ${{ matrix.self_contained }}
      artifact_suffix: ${{ matrix.artifact_suffix }}
      runtime_variant: ${{ matrix.runtime_variant }}
    secrets: inherit

  changelog:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    steps:
      - name: Checkout all
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate changelog
        run: git-cliff --latest -o CHANGELOG.md

      - name: Add changelog to release
        uses: softprops/action-gh-release@v2.2.2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rename_and_release:
    permissions:
      contents: write
      actions: write
    needs: [build, changelog]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - configuration: Release
            architecture: x64
            artifact_suffix: ''
          - configuration: Release
            architecture: x64
            artifact_suffix: _NoRuntime
          - configuration: Release
            architecture: ARM64
            artifact_suffix: ''
          - configuration: Release
            architecture: ARM64
            artifact_suffix: _NoRuntime
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: PCL2_N_${{ matrix.configuration }}_${{ matrix.architecture }}${{ matrix.artifact_suffix }}
          path: ./artifact

      - name: Rename binaries
        run: |
          mv "./artifact/Plain Craft Launcher 2.exe" "PCL2_N_${{ matrix.configuration }}_${{ matrix.architecture }}${{ matrix.artifact_suffix }}.exe"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign the binary
        run: |
          gpg --detach-sign --armor "PCL2_N_${{ matrix.configuration }}_${{ matrix.architecture }}${{ matrix.artifact_suffix }}.exe"

      - name: Upload binary and signature to Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: |
            PCL2_N_${{ matrix.configuration }}_${{ matrix.architecture }}${{ matrix.artifact_suffix }}.exe
            PCL2_N_${{ matrix.configuration }}_${{ matrix.architecture }}${{ matrix.artifact_suffix }}.exe.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
