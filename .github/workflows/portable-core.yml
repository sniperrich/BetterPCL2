name: Portable Core

permissions:
  contents: read

on:
  push:
    branches: [dev]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore portable graph
        run: dotnet restore PCL.Portable.slnx -p:Configuration=Release
      - name: Build portable graph with warnings as errors
        run: dotnet build PCL.Portable.slnx -c Release --no-restore -warnaserror
      - name: Run portable tests
        run: dotnet test PCL.Portable.slnx -c Release --no-build --no-restore -warnaserror
      - name: Cross-compile Windows shell and reject platform warnings
        run: dotnet build "Plain Craft Launcher 2/Plain Craft Launcher 2.csproj" -c Release -p:Platform=x64 -p:EnableWindowsTargeting=true -warnaserror:CA1416

  native-aot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Publish Native AOT smoke test
        run: dotnet publish PCL.Core.Portable.AotSmoke/PCL.Core.Portable.AotSmoke.csproj -c Release -r linux-x64 -warnaserror
      - name: Run Native AOT smoke test
        run: ./PCL.Core.Portable.AotSmoke/bin/Release/net10.0/linux-x64/publish/PCL.Core.Portable.AotSmoke
      - name: Publish application Native AOT launch smoke test
        run: dotnet publish PCL.Application.AotSmoke/PCL.Application.AotSmoke.csproj -c Release -r linux-x64 -warnaserror
      - name: Run application Native AOT launch smoke test
        run: ./PCL.Application.AotSmoke/bin/Release/net10.0/linux-x64/publish/PCL.Application.AotSmoke
      - name: Publish online Native AOT smoke test
        run: dotnet publish PCL.Online.AotSmoke/PCL.Online.AotSmoke.csproj -c Release -r linux-x64 -warnaserror
      - name: Run online Native AOT smoke test
        run: ./PCL.Online.AotSmoke/bin/Release/net10.0/linux-x64/publish/PCL.Online.AotSmoke

  desktop-native-aot:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Select desktop runtime
        id: runtime
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            if [[ "$(uname -m)" == "arm64" ]]; then
              echo "rid=osx-arm64" >> "$GITHUB_OUTPUT"
            else
              echo "rid=osx-x64" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "rid=linux-x64" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish Avalonia desktop Native AOT shell
        run: dotnet publish PCL.Desktop/PCL.Desktop.csproj -c Release -r ${{ steps.runtime.outputs.rid }} -warnaserror
      - name: Validate Avalonia desktop Native AOT shell
        shell: bash
        run: |
          ./PCL.Desktop/bin/Release/net10.0/${{ steps.runtime.outputs.rid }}/publish/PCL.Desktop --validate-environment
          ./PCL.Desktop/bin/Release/net10.0/${{ steps.runtime.outputs.rid }}/publish/PCL.Desktop --validate-assets
