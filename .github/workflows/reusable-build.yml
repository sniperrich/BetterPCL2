name: Build (Reusable)

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      configuration:
        required: true
        type: string
      architecture:
        required: true
        type: string
      self_contained:
        required: false
        type: boolean
        default: true
      artifact_suffix:
        required: false
        type: string
        default: ''
      runtime_variant:
        required: false
        type: string
        default: SelfContained

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      LANG: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Describe
        run: |
          describe=`git describe --tags --always`
          echo "describe=$describe" >> $GITHUB_ENV

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore N Cloud certificates
        shell: bash
        env:
          N_CLOUD_SERVER_CERT_BASE64: ${{ secrets.N_CLOUD_SERVER_CERT_BASE64 }}
          N_CLOUD_CLIENT_PFX_BASE64: ${{ secrets.N_CLOUD_CLIENT_PFX_BASE64 }}
        run: |
          set -euo pipefail
          cert_dir="PCL.Online/Certificates"
          mkdir -p "$cert_dir"

          if [[ -n "${N_CLOUD_SERVER_CERT_BASE64:-}" ]]; then
            printf '%s' "$N_CLOUD_SERVER_CERT_BASE64" |
              tr -d '\r\n ' |
              base64 -d > "$cert_dir/n-cloud.cer"
          fi

          if [[ -n "${N_CLOUD_CLIENT_PFX_BASE64:-}" ]]; then
            printf '%s' "$N_CLOUD_CLIENT_PFX_BASE64" |
              tr -d '\r\n ' |
              base64 -d > "$cert_dir/n-cloud-client.pfx"
            chmod 600 "$cert_dir/n-cloud-client.pfx"
          fi

      - name: Validate N Cloud certificates
        shell: bash
        run: |
          set -euo pipefail
          cert="PCL.Online/Certificates/n-cloud.cer"
          pfx="PCL.Online/Certificates/n-cloud-client.pfx"
          test -s "$cert" || {
            echo "::error file=$cert::N Cloud pinned certificate is missing or empty."
            exit 1
          }

          openssl x509 -in "$cert" -noout -checkend 0 || {
            echo "::error file=$cert::N Cloud pinned certificate is invalid or expired."
            exit 1
          }

          openssl x509 -in "$cert" -noout -ext subjectAltName |
            grep -Fq "IP Address:115.29.230.105" || {
              echo "::error file=$cert::N Cloud certificate SAN does not contain IP 115.29.230.105."
              exit 1
            }

          echo "N Cloud certificate SHA-256:"
          openssl x509 -in "$cert" -outform DER | sha256sum

          require_client_cert=false
          if [[ "${{ github.event_name }}" != "pull_request" || "${{ inputs.configuration }}" != "CI" ]]; then
            require_client_cert=true
          fi

          if [[ ! -s "$pfx" ]]; then
            if [[ "$require_client_cert" == "true" ]]; then
              echo "::error file=$pfx::N Cloud client certificate PFX is required for non-PR builds."
              exit 1
            fi

            echo "::warning file=$pfx::N Cloud client certificate PFX is missing; PR artifact will not be able to call mTLS APIs."
            exit 0
          fi

          client_cert="$RUNNER_TEMP/n-cloud-client.crt"
          openssl pkcs12 -legacy -in "$pfx" -passin pass: -clcerts -nokeys -out "$client_cert" || {
            echo "::error file=$pfx::N Cloud client PFX must be readable with an empty password."
            exit 1
          }

          openssl x509 -in "$client_cert" -noout -checkend 0 || {
            echo "::error file=$pfx::N Cloud client certificate is invalid or expired."
            exit 1
          }

          openssl x509 -in "$client_cert" -noout -purpose |
            grep -Fq "SSL client : Yes" || {
              echo "::error file=$pfx::N Cloud client certificate is not valid for TLS client authentication."
              exit 1
            }

          echo "N Cloud client certificate SHA-1 thumbprint:"
          openssl x509 -in "$client_cert" -noout -fingerprint -sha1

      - name: Build Project
        env:
          PCL_WRITE_SECRET: '1'
          PCL_MS_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          PCL_CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          PCL_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          PCL_NAID_CLIENT_ID: ${{ secrets.NAID_CLIENT_ID }}
          PCL_NAID_CLIENT_SECRET: ${{ secrets.NAID_CLIENT_SECRET }}
          PCL_LINK_SERVER_ROOT: ${{ secrets.LINK_SERVER_ROOTS }}
          PCL_LOBBY_DEFAULT_SECRET: ${{ secrets.LOBBY_DEFAULT_SECRET }}
          PCL_GITHUB_SHA: ${{ github.sha }}
        run: |
          arch=$(echo "${{ inputs.architecture }}" | tr '[:upper:]' '[:lower:]')
          case "$arch" in
            x64) rid=win-x64 ;;
            x86) rid=win-x86 ;;
            arm64) rid=win-arm64 ;;
            *) rid=win-x64 ;;
          esac
          dotnet publish "Plain Craft Launcher 2/Plain Craft Launcher 2.csproj" \
            -p:Configuration=${{ inputs.configuration }} -p:Platform=${{ inputs.architecture }} \
            -r "$rid" --self-contained "${{ inputs.self_contained }}" \
            -p:PclRuntimeVariant=${{ inputs.runtime_variant }} \
            -p:DeleteExistingFiles=true -o ./artifact

      - name: Validate embedded legal documents
        shell: bash
        run: |
          executable="./artifact/Plain Craft Launcher 2.exe"
          test -s "$executable" || {
            echo "::error file=$executable::Published launcher executable is missing."
            exit 1
          }

          grep -aFq "# PCL-N 用户服务协议" "$executable" || {
            echo "::error file=$executable::Embedded Chinese terms of service are missing."
            exit 1
          }

          grep -aFq "# PCL-N 隐私保护政策" "$executable" || {
            echo "::error file=$executable::Embedded Chinese privacy policy is missing."
            exit 1
          }

      - name: Upload the Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCL2_N_${{ inputs.configuration }}_${{ inputs.architecture }}${{ inputs.artifact_suffix }}
          path: artifact/**
